name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Tarantool
      run: |
        curl -L https://tarantool.io/release/2/installer.sh | sudo bash
        sudo apt-get install -y tarantool tarantool-dev

    - name: Build C-Extension
      run: |
        cd src/tarantool
        make

    - name: Run Lua Tests
      run: |
        export LUA_CPATH="./src/tarantool/?.so;;"
        tarantool tests/lua/tests.lua

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Go Benchmark (Build only)
      run: |
        cd tests/go
        go mod tidy
        go build -o benchmark benchmark.go
